name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # IN CI, A SKIPPED TEST IS A FAILED TEST.
      #
      # CI is the one place where every dependency is supposed to be present — Docker,
      # Chrome, a network. So a skip here does not mean "not applicable", it means a
      # guard fired that should not have, and a guard that fires wrongly is invisible:
      # nobody reads "skipped".
      #
      # anvil's sandbox tests skipped on EVERY Linux CI run for the life of the project
      # — `pass 11 · fail 0 · skipped 9`, green — because the skip guard probed by
      # running anvil, and anvil was broken. The breakage switched off the tests that
      # would have caught it. This is the net under that.
      - name: run the tests — and none of them may be skipped
        run: |
          node --test 2>&1 | tee "$RUNNER_TEMP/test.txt"
          code=${PIPESTATUS[0]}
          test "$code" -eq 0 || exit $code
          n=$(grep -oE '^# skipped [0-9]+|^. skipped [0-9]+' "$RUNNER_TEMP/test.txt" | grep -oE '[0-9]+$' | head -1)
          echo "skipped: ${n:-0}"
          if [ "${n:-0}" -ne 0 ]; then
            echo "::error::${n} test(s) skipped in CI. Everything they need is installed here — a skip means a guard misfired, and a green build is hiding it."
            exit 1
          fi

  # Looking is part of the build now. This tool shipped a phone layout that dragged
  # the page 250px sideways, and controls at 2.4:1, past a green `node --test` — a
  # test suite does not look at the page. iris does: phone, tablet and desktop, in
  # both themes, and it fails here rather than in front of someone.
  # CAN THE TEST SUITE STILL FAIL?
  #
  # Every other gate asks "is the code right". This one asks the question underneath it:
  # IS ANYTHING STILL WATCHING. A suite that has quietly stopped covering a property goes
  # green for exactly the same reason as one that is passing honestly.
  #
  # It earned its keep on its FIRST RUN here too: the `.md` filter in the vault walk could
  # be deleted outright and the whole suite stayed green — because every fixture in it
  # happens to be markdown. A real Obsidian vault is full of PNGs, PDFs and .canvas files.
  mutants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: break it on purpose — every canary must die
        run: node scripts/mutants.mjs

  look:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # THE GATE WAS LOOKING AT AN EMPTY PAGE.
      #
      # Every one of these UIs is data-driven, and CI was serving it with nothing in it.
      # An empty page cannot overflow, cannot collide, cannot clip and cannot be
      # unreadable — there is nothing on it to be wrong. A UI gate that has never seen a
      # row of real data is not a gate; it is a screenshot of an empty room.
      #
      # (agent-hq's gate had been auditing a blank board for months. It went green every
      # time. The seed script existed; nobody ran it.)
      #
      # So: put something real on the page, and ASSERT it is there before looking.
      - name: Serve it, THEN put something on it
        run: |
          CORTEX_VAULT=./vault node scripts/seed.js
          CORTEX_VAULT=./vault node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7800/api/stats >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7800/api/stats | node -pe "JSON.parse(require('fs').readFileSync(0)).notes ?? 0")
          echo "on the page: notes=$n"
          test "$n" -gt 0 || { echo "::error::notes=0 — iris would be auditing an empty page"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7800/
          viewports: phone,tablet,desktop
          name: cortex
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true     # drift is a regression now; a gate is what keeps it from creeping back
          # A HOVER STATE IS CSS NOBODY HAS EVER LOOKED AT. The legend's rows RAISE under the
          # pointer — .row:hover paints --card and lifts the label to --ink — and the COUNT beside
          # the label did not come with it: --ink-faint on --card read 4.43:1, on every row, in a
          # green build. JS cannot pose :hover (it is the browser's own), so nothing here could
          # render it. `.solo` reaches the same --card surface with no pointer at all, and is posed
          # by nothing either. Selectors that live on a note's page are named below by iris rather
          # than passed over: look-note is where those get rendered.
          # 🔑 THIS LIST NAMED 27 STATES AND RENDERED 3. A LIST THAT NAMES MORE THAN THE VIEW SHOWS
          # LIES, AND IT LIES IN THE DIRECTION OF "CLEAN".
          #
          # Measured, not guessed — iris's own blind-spot line: "24 of 27 --hover selectors matched
          # NOTHING here". The 27 broke down as:
          #
          #   3  actually render here: .brand, .row, .xtk a  ← all this job was ever auditing
          #   5  redundant: .chip.tag/.wl/.backlink (look-note), .vi/.j-in button (look-panels) —
          #      already hovered by the job that opens their door
          #   2  render on the NOTE page, so they moved there: .chip, .focus-btn
          #  15  FICTION — .crumb, .gbtn, .legend-x, .lnk, .note-x, .sbtn, .search-x, .tb-b,
          #      .theme-btn, .dot, .hit, .nav a, .pill, .sug, .tool. Not one of them exists in
          #      this product: no class attribute, no CSS rule, nothing. They are class names
          #      from sibling repos, pasted into this list, matching nothing since the day they
          #      arrived — cortex's theme control is a <button data-act="theme"> and always was.
          #      Deleted.
          #   2  real, and rendered by no state any gate reaches: .tagpill (the "Top tags" panel)
          #      and .back (the panel's back button, which needs a navigation stack two notes
          #      deep). LEFT OUT rather than named-and-never-reached — naming them is exactly
          #      what made this list read as coverage. ▶ These two are the next doors, and they
          #      are the ONLY two: open them with `pre`, then put them back.
          #
          # 🔑 I said "9 fiction, 6 real" here an hour ago and both numbers were wrong, because
          # `grep -rl hit public/` matches "white" and "within". A substring grep cannot answer
          # "does this class exist" — ask for it as a class attribute or a CSS selector, or you
          # will send the next reader hunting for doors that were never there.
          hover: '.brand, .row, .xtk a'

  # THE SEARCH DROPDOWN — .results IS display:none UNTIL YOU TYPE, SO NOTHING HAD EVER SEEN IT.
  #
  # `.results .r` sat in the list above for months. It matched nothing on a page nobody had typed
  # into, so it rendered nothing, and the gate reported clean about a state it never reached — the
  # quiet kind of pass iris now prints a blind-spot line for (C170). Opening the door found the bug
  # on the first render: `.r-more` at 10px, off the 4px grid this repo declares. Every door opened
  # in this kit so far has had something behind it.
  #
  # The rows are NOT tabbable and must not become buttons: this is a combobox, the input keeps
  # focus, and aria-activedescendant carries the selection. iris's unreachable-control rule asked
  # for tabindex="0" + role="button" on all 8 — the opposite of the pattern — and was fixed to
  # exempt a declared composite. The `pre` below pins the contract that fix relies on.
  look-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it with notes in it, so a search can match something
        run: |
          CORTEX_VAULT=./vault node scripts/seed.js
          CORTEX_VAULT=./vault node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7800/api/stats >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7800/api/stats | node -pe "JSON.parse(require('fs').readFileSync(0)).notes ?? 0")
          test "$n" -gt 0 || { echo "::error::notes=0 — a search would match nothing and the door would stay shut"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7800/
          viewports: phone,tablet,desktop
          name: cortex-search
          tokens: kit
          strict: true
          hover: '.results .r'
          # Drive it exactly as a keyboard does, assert every announcement follows the highlight,
          # and LEAVE THE DROPDOWN OPEN so the hover audit above has something to look at.
          pre: |
            const q = document.querySelector('#q'), R = document.querySelector('#results');
            const key = (k) => q.dispatchEvent(new KeyboardEvent('keydown', { key: k, bubbles: true, cancelable: true }));
            const type = async () => { q.focus(); q.value = 'a'; q.dispatchEvent(new Event('input', { bubbles: true })); await new Promise((r) => setTimeout(r, 800)); };
            if (q.getAttribute('aria-expanded') !== 'false') throw new Error('the combobox claims to be expanded before anything opened it');
            await type();
            const rows = [...R.querySelectorAll('.r')];
            if (rows.length < 2) throw new Error('need 2+ result rows to test the keyboard, got ' + rows.length);
            if (q.getAttribute('aria-expanded') !== 'true') throw new Error('the open dropdown does not announce aria-expanded');
            if (q.getAttribute('aria-activedescendant') !== rows[0].id) throw new Error('aria-activedescendant does not name the first row');
            key('ArrowDown');
            if (!rows[1].classList.contains('sel')) throw new Error('ArrowDown did not move the highlight');
            if (q.getAttribute('aria-activedescendant') !== rows[1].id) throw new Error('ArrowDown moved the highlight but not the announcement — they are the same fact');
            if (rows[1].getAttribute('aria-selected') !== 'true' || rows[0].getAttribute('aria-selected') !== 'false') throw new Error('aria-selected did not follow the selection');
            key('ArrowUp');
            if (q.getAttribute('aria-activedescendant') !== rows[0].id) throw new Error('ArrowUp did not come back');
            if ([...R.querySelectorAll('[aria-selected=true]')].length !== 1) throw new Error('more than one row claims to be selected');
            key('Enter');
            await new Promise((r) => setTimeout(r, 500));
            if (R.classList.contains('on')) throw new Error('Enter did not close the dropdown');
            if (q.getAttribute('aria-expanded') !== 'false') throw new Error('the closed dropdown still announces itself as expanded');
            await type();
            if (!R.classList.contains('on')) throw new Error('the dropdown did not reopen — there would be nothing to look at');

  # THE EMPTY STATE IS THE ONE STATE EVERY USER SEES FIRST — AND NOTHING WAS LOOKING AT IT.
  #
  # The `look` job above seeds data on purpose: a UI gate that has never seen a row of data
  # is a screenshot of an empty room. But making every gate seed meant the EMPTY page — the
  # first thing a new user ever sees — stopped being rendered by anything at all. I closed
  # one blind spot by opening another.
  #
  # And a real bug was living in it: `scout serve` CRASHED AT STARTUP on a machine with no
  # cache, because stats() runs before the server listens and a read no longer creates the
  # store. A brand-new user's very first command died. The tests seed, the gate seeds, and
  # my own machine has had a cache for weeks — so the bug lived in a state nothing here
  # ever entered.
  first-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: serve it with NOTHING in it, exactly as a new user would
        run: |
          CORTEX_VAULT=/tmp/empty/v node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7800/ >/dev/null && break; sleep 1; done
          curl -sf http://localhost:7800/ >/dev/null || { echo "::error::the server did not start on an empty store — that is what a new user gets"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7800/
          viewports: phone,tablet,desktop
          name: cortex-first-run
          pre: >-
            const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(!vis.length) throw new Error('THE SERVER SAID EMPTY AND THE PAGE SAID NOTHING — a fresh install shows the user a blank room');
          tokens: kit

  # ── …AND THE NOTE, WHICH IS THE WHOLE POINT OF A SECOND BRAIN ─────────────────
  #
  # `look` seeds a vault and renders the GRAPH. `first-run` renders it empty. `states` poses the
  # page by setting classes. Not one of them had ever OPENED A NOTE — the panel where you actually
  # read what you wrote, which is the only reason the graph is a door rather than a picture.
  #
  # Note that this gate reaches its state by USING the app (the deep-link hash a cross-tool link
  # would use), not by posing it. The first look that ever opened a note found, at every viewport
  # and both themes: the type chip's `color:#fff` at 2.72:1 (white is unreadable on ALL FIVE type
  # colours in the dark palette — 1.61:1 on source), and on a phone the panel left a 27px sliver
  # that printed the brand as a sliced "c" — 86% of "cortex." under a fixed panel on a page that
  # cannot scroll. Nothing else in this repo could have seen either.
  look-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN prove there is a note to open
        run: |
          CORTEX_VAULT=./vault node scripts/seed.js
          CORTEX_VAULT=./vault node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7800/api/stats >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7800/api/graph | node -pe "(JSON.parse(require('fs').readFileSync(0)).nodes||[]).filter(x=>!x.ghost).length")
          echo "real notes the gate can open: $n"
          test "$n" -gt 0 || { echo "::error::no real notes — iris would audit a graph with nothing to open"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7800/
          viewports: phone,tablet,desktop
          name: cortex-note
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true     # drift is a regression now; a gate is what keeps it from creeping back
          # Open a real note the way a cross-tool deep link does, then assert the panel actually has
          # the note in it. A --pre that throws makes iris report "the state was never reached and
          # NOTHING was audited" instead of quietly grading the graph behind it.
          #
          # The two sleep(1500)s that used to be here were BETS: they passed on my laptop and would
          # have failed on a loaded runner, which is exactly how C164 shipped a race into this repo.
          # A poll waits for the note to ARRIVE and costs ~50ms when it is already there.
          #
          # The note page is also the only place .wl/.backlink/.xtk a/.chip.tag exist — `look` names
          # them and reports them as never-rendered. This is where they get rendered.
          # .chip and .focus-btn were named by the main `look` job, where they render nothing.
          # They render HERE, with the note open — measured, not assumed.
          hover: '.backlink, .wl, .xtk a, #panel .close, .chip.tag, .brand, .chip, .focus-btn'
          pre: >-
            const until=async(f,ms=8000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the note to arrive');};await until(()=>document.querySelectorAll('#legend .row').length>0);const g=await (await fetch('/api/graph')).json();const n=(g.nodes||[]).find(x=>!x.ghost);if(!n) throw new Error('the seeded vault has no real notes — nothing to open');location.hash='#'+n.id;await until(()=>document.getElementById('noteBody')?.textContent?.trim());

  # ── THE PANELS NOBODY EVER OPENED ─────────────────────────────────────────────
  # `look` audits the graph. It also NAMES .ibx/.vi/.results selectors it can never reach from
  # there and reports them as blind — "13 of 28 --hover selectors matched NOTHING here". I read
  # that line for weeks as a formality. It was an inventory of unaudited UI.
  #
  # Behind those four buttons: an ORPHAN badge at 1.94:1 on light — not a near-miss, invisible —
  # because #f0a35e was hardcoded against the dark card (8.3:1) and so had no light theme to fail
  # in. The node-ink comment at the top of index.html had already written this lesson down after
  # three of five node colours failed on white. One line skipped it. And --ink-faint on .ibx/.vi's
  # --card read 4.43:1 on 20 more elements — the same pairing, the same number, as the legend count.
  #
  # A gate that stops at the doorway grades the room it is standing in and calls the house clean.
  look-panels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN prove the panels have something in them
        run: |
          CORTEX_VAULT=./vault node scripts/seed.js
          CORTEX_VAULT=./vault node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7800/api/stats >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7800/api/stats | node -pe "JSON.parse(require('fs').readFileSync(0)).notes ?? 0")
          echo "on the page: notes=$n"
          test "$n" -gt 0 || { echo "::error::notes=0 — the panels would open EMPTY, which is an empty room"; exit 1; }
      # The inbox: opened the way a user opens it — by pressing the button. Every wait here is a
      # poll for the thing to ARRIVE, not a sleep betting on how long a loaded runner takes (C164:
      # iris photographed a frame nobody was meant to read, because --pre waited for .hit to EXIST).
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7800/
          viewports: phone,tablet,desktop
          name: cortex-inbox
          tokens: kit
          strict: true
          hover: '.ibx .t, .ibx .sg, .ibx .weave, #inbox .close'
          pre: >-
            const until=async(f,ms=8000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the inbox to arrive');};await until(()=>document.querySelectorAll('#legend .row').length>0);document.getElementById('inboxBtn').click();await until(()=>document.getElementById('inbox').classList.contains('open'));await until(()=>document.querySelectorAll('.ibx .t').length>0);
      # The vault: #health opens it. 16 rows of --ink-faint on --card lived in here.
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7800/
          viewports: phone,tablet,desktop
          name: cortex-vault
          tokens: kit
          strict: true
          hover: '.vi, #vault .close, #health'
          pre: >-
            const until=async(f,ms=8000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the vault to arrive');};await until(()=>document.querySelectorAll('#legend .row').length>0);document.getElementById('health').click();await until(()=>document.getElementById('vault').classList.contains('open'));await until(()=>document.querySelectorAll('.vi').length>0);
      # The journal is CLEAN — and it is in here because it is the fourth door, not because it is
      # broken. It shares the panel CSS the other three were wrong about; a gate is what keeps it
      # from joining them.
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7800/
          viewports: phone,tablet,desktop
          name: cortex-journal
          tokens: kit
          strict: true
          hover: '.j-d, .j-in button, #journal .close'
          pre: >-
            const until=async(f,ms=8000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the journal to arrive');};await until(()=>document.querySelectorAll('#legend .row').length>0);document.getElementById('journalBtn').click();await until(()=>document.getElementById('journal').classList.contains('open'));await until(()=>document.querySelectorAll('.j-in button, .j-d').length>0);

  # ── THE STATES NOTHING EVER RENDERED ──────────────────────────────────────────
  # `test` proves the logic. `look` renders the page WORKING. `first-run` renders it
  # EMPTY. Not one of them has ever rendered a control that cannot be pressed, or a row
  # switched off, or a card blocked — the states you have to DO something to reach.
  #
  # So nobody had ever looked at them, and every single one of them was broken: every
  # disabled control in this kit was unreadable, two of them at 1:1 — the exact colour of
  # their own background — under three green gates. A state that is never rendered is a
  # state that is never checked, and it will rot, quietly, forever.
  #
  # This gate poses the page in those states and audits it there.
  states:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7945 &
          for i in $(seq 30); do curl -sf http://localhost:7945/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7945/
          viewports: desktop
          tokens: kit
          name: states
          pre: >-
            document.querySelectorAll('button,input,select,textarea').forEach(e=>e.disabled=true);document.querySelectorAll('.card').forEach(e=>e.classList.add('blocked'));document.querySelectorAll('#legend .row,.gl-item').forEach(e=>e.classList.add('off'))

  # ── WHAT DOES IT DRAW WHEN THE SERVER SAYS NO? ────────────────────────────────
  # This UI is a shell that asks a server what to render, and it had never once
  # rendered the answer "no". The helper was `fetch(p).then(r => r.json())` — it never
  # looked at `r.ok`, so a 500 with a JSON body came back looking exactly like DATA,
  # `.map` threw halfway through the render, and the page was left a blank shell.
  #
  # The result: when the backend died you were shown AN EMPTY ROOM. Nothing on screen
  # told "the server is down" apart from "you have no data" — and the `first-run` gate
  # PROVES the empty page looks fine, so it went green over it every time.
  #
  # An error state that renders as an empty state is worse than a crash. A crash at
  # least tells you something happened.
  #
  # --boot breaks the API before the app's first line runs; --pre then asserts the app
  # ADMITTED it. A page that quietly renders nothing fails this job.
  dead-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7945 &
          for i in $(seq 30); do curl -sf http://localhost:7945/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7945/
          viewports: desktop
          tokens: kit
          name: dead-api
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>String(u).includes('/api/')?Promise.resolve(new Response('{"error":"ci"}',{status:500,headers:{'content-type':'application/json'}})):f(u,o);
          pre: >-
            const b=document.getElementById('apidown');if(!b||b.hidden||!b.textContent.trim()) throw new Error('the server said no and the page said NOTHING');const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(vis.length) throw new Error('THE SERVER SAID NO, AND THE PAGE STILL CLAIMS YOU HAVE NOTHING: '+vis.map(e=>e.id||e.className).join(', '));

  # ── AND WHAT DOES IT DRAW WHILE THE SERVER IS STILL THINKING? ─────────────────
  # This app had exactly ONE way of showing "nothing": nothing. So three completely
  # different truths rendered as the same picture — you have no data, the server is
  # broken, and the server has not answered yet.
  #
  # On a slow backend, lens put its welcome screen up — "Pick a file from the tree" —
  # over a tree that had not loaded. The empty state is a CLAIM ("you have nothing"),
  # and the app was making it before it had any evidence. It had not been told
  # "nothing". It had not been told ANYTHING.
  #
  # --boot makes every API call take 20s. The page must say it is still asking.
  slow-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7945 &
          for i in $(seq 30); do curl -sf http://localhost:7945/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7945/
          viewports: desktop
          tokens: kit
          name: slow-api
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>String(u).includes('/api/')?new Promise(r=>setTimeout(()=>r(f(u,o)),20000)):f(u,o);
          pre: >-
            const p=document.getElementById('busypill');if(!p||p.hidden) throw new Error('SILENT WAIT: the server is thinking and the page says nothing');if(document.body.getAttribute('aria-busy')!=='true') throw new Error('and nothing announced it to a screen reader either');const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(vis.length) throw new Error('STILL ASKING, YET CLAIMING EMPTY: '+vis.map(e=>e.className).join(', '));

  # ── AND WHAT HAPPENS AFTER YOU ACT? ───────────────────────────────────────────
  # Every state so far has been one the app FOUND itself in. This is the one it is put
  # into: you press the button, the server refuses the write, and… what?
  #
  # The failure mode here is not an error, it is SILENCE. A write that fails quietly is
  # the worst bug a tool like this can have, because the user walks away believing their
  # work was saved. And its twin: the write fails, and the button that would let you try
  # again is still greyed out saying "creating…" — so the app is both wrong and stuck.
  #
  # --boot refuses every non-GET (reads stay healthy). --pre then DRIVES THE REAL WRITE
  # — opens the form, types, presses the button — and demands the page admit it failed
  # and give the control back.
  refused-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7945 &
          for i in $(seq 30); do curl -sf http://localhost:7945/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7945/
          viewports: desktop
          tokens: kit
          name: refused-write
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>(o&&o.method&&o.method!=='GET')?Promise.resolve(new Response('{"error":"the server refused the write"}',{status:500,headers:{'content-type':'application/json'}})):f(u,o);
          pre: >-
            document.getElementById('newBtn').click();await new Promise(r=>setTimeout(r,500));const N=document.getElementById('cmpName'),B=document.getElementById('cmpBody');N.value='a note that will never be saved';N.dispatchEvent(new Event('input',{bubbles:true}));B.value='body';B.dispatchEvent(new Event('input',{bubbles:true}));document.getElementById('cmpSave').click();await new Promise(r=>setTimeout(r,2000));const stuck=[...document.querySelectorAll('button')].filter(b=>b.disabled&&/…|ing\b/i.test(b.textContent));if(stuck.length) throw new Error('THE WRITE FAILED AND THE BUTTON IS STILL SPINNING: '+stuck.map(b=>b.textContent.trim()).join(', '));const said=[...document.querySelectorAll('*')].some(e=>e.children.length===0&&/refused the write/i.test(e.textContent));if(!said) throw new Error('THE WRITE FAILED AND THE PAGE SAID NOTHING — the user cannot tell whether their work was saved');
