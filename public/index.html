<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body>
<title>cortex — an agent's second brain</title>
<style>
  :root {
    --bg:#06080f; --bg-2:#0b0e1c; --glow:#141b3e; --nebula:#1a1140;
    --panel:rgba(15,19,34,.74); --panel-solid:#0d111f; --card:#141a2c;
    --line:#232b47; --line-2:#2e3860; --ink:#eaeffb; --ink-dim:#8e99b9; --ink-faint:#525d80;
    --accent:#8ab4ff; --accent-2:#c4a5ff;
    --n-project:#2fe6a6; --n-concept:#7aa2ff; --n-source:#ffc24d; --n-entity:#cf9bff; --n-moc:#ff6b8b;
    --shadow:0 24px 70px -18px rgba(0,0,0,.85); --ctrl:rgba(20,26,44,.7);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f4f7fe; --bg-2:#eaf0fb; --glow:#e2eafb; --nebula:#ece6fb;
      --panel:rgba(255,255,255,.8); --panel-solid:#fff; --card:#f4f7fe;
      --line:#dde4f1; --line-2:#c8d2e6; --ink:#111830; --ink-dim:#57617d; --ink-faint:#98a2be;
      --accent:#2f57cf; --accent-2:#7a45e0;
      --n-project:#06b981; --n-concept:#3b6bf0; --n-source:#d98a00; --n-entity:#8b46e6; --n-moc:#e0405f;
      --shadow:0 24px 60px -22px rgba(40,60,120,.3); --ctrl:rgba(255,255,255,.82);
    }
  }
  :root[data-theme="dark"]{--bg:#06080f;--bg-2:#0b0e1c;--glow:#141b3e;--nebula:#1a1140;--panel:rgba(15,19,34,.74);--panel-solid:#0d111f;--card:#141a2c;--line:#232b47;--line-2:#2e3860;--ink:#eaeffb;--ink-dim:#8e99b9;--ink-faint:#525d80;--accent:#8ab4ff;--accent-2:#c4a5ff;--n-project:#2fe6a6;--n-concept:#7aa2ff;--n-source:#ffc24d;--n-entity:#cf9bff;--n-moc:#ff6b8b;--shadow:0 24px 70px -18px rgba(0,0,0,.85);--ctrl:rgba(20,26,44,.7);}
  :root[data-theme="light"]{--bg:#f4f7fe;--bg-2:#eaf0fb;--glow:#e2eafb;--nebula:#ece6fb;--panel:rgba(255,255,255,.8);--panel-solid:#fff;--card:#f4f7fe;--line:#dde4f1;--line-2:#c8d2e6;--ink:#111830;--ink-dim:#57617d;--ink-faint:#98a2be;--accent:#2f57cf;--accent-2:#7a45e0;--n-project:#06b981;--n-concept:#3b6bf0;--n-source:#d98a00;--n-entity:#8b46e6;--n-moc:#e0405f;--shadow:0 24px 60px -22px rgba(40,60,120,.3);--ctrl:rgba(255,255,255,.82);}

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:var(--bg);color:var(--ink);overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;}
  canvas{position:fixed;inset:0;display:block;cursor:grab;touch-action:none;}
  canvas.drag{cursor:grabbing;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  button:focus-visible,input:focus-visible,[role="button"]:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  ::selection{background:color-mix(in srgb,var(--accent) 30%,transparent);}

  /* ── top bar ── */
  #bar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:22px;padding:18px 24px;
    background:linear-gradient(180deg,var(--bg) 8%,color-mix(in srgb,var(--bg) 40%,transparent) 62%,transparent);pointer-events:none;}
  #bar>*{pointer-events:auto;}
  .brand{display:flex;flex-direction:column;gap:3px;}
  .brand .eyebrow{font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-dim);}
  .brand .word{font-size:23px;font-weight:750;letter-spacing:-.025em;line-height:1;}
  .brand .word b{color:var(--accent);font-weight:750;}
  .brand .word i{color:var(--n-project);font-style:normal;}
  .stat{font-size:12.5px;color:var(--ink-dim);white-space:nowrap;}
  .stat b{color:var(--ink);font-weight:650;font-variant-numeric:tabular-nums;}
  .stat s{color:var(--ink-faint);text-decoration:none;margin:0 4px;}

  .search{margin-left:auto;position:relative;width:min(340px,46vw);}
  .search .ibox{position:relative;}
  .search input{width:100%;padding:11px 15px 11px 38px;font-size:13.5px;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:13px;outline:none;backdrop-filter:blur(16px);transition:border-color .16s,box-shadow .16s;}
  .search input::placeholder{color:var(--ink-faint);}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 15%,transparent);}
  .search .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;pointer-events:none;}
  .results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--panel-solid);border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);overflow:hidden;max-height:52vh;overflow-y:auto;display:none;}
  .results.on{display:block;}
  .results .r{display:flex;align-items:center;gap:11px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line);}
  .results .r:last-child{border-bottom:none;}
  .results .r.sel,.results .r:hover{background:var(--card);}
  .results .r .d{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 9px currentColor;}
  .results .r .tx{min-width:0;}
  .results .r .tt{font-size:13.5px;font-weight:560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .results .r .sn{font-size:11.5px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .results .r .ty{margin-left:auto;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);flex:none;}
  .results .empty{padding:16px 14px;font-size:12.5px;color:var(--ink-dim);}

  /* ── controls ── */
  #controls{position:fixed;right:24px;bottom:26px;z-index:16;display:flex;flex-direction:column;gap:7px;}
  #controls button{width:40px;height:40px;display:grid;place-items:center;border-radius:12px;color:var(--ink-dim);
    background:var(--ctrl);border:1px solid var(--line);backdrop-filter:blur(16px);box-shadow:var(--shadow);transition:color .14s,border-color .14s,transform .1s;}
  #controls button:hover{color:var(--ink);border-color:var(--line-2);}
  #controls button:active{transform:scale(.93);}
  #controls .sep{height:1px;background:var(--line);margin:1px 6px;}

  /* ── legend ── */
  #legend{position:fixed;left:24px;bottom:26px;z-index:15;display:flex;flex-direction:column;gap:2px;padding:12px 10px;border-radius:15px;
    background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(16px);box-shadow:var(--shadow);}
  #legend .t{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);padding:2px 8px 6px;}
  #legend .row{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-dim);padding:5px 8px;border-radius:9px;cursor:pointer;transition:background .12s,color .12s;user-select:none;}
  #legend .row:hover{background:var(--card);color:var(--ink);}
  #legend .row.off{opacity:.4;}
  #legend .row.solo{background:var(--card);color:var(--ink);}
  #legend .g{width:10px;height:10px;border-radius:50%;box-shadow:0 0 11px 1px currentColor;flex:none;}
  #legend .g.ghost{box-shadow:none;border:1.5px dashed var(--ink-faint);}
  #legend .n{margin-left:auto;font-size:10.5px;color:var(--ink-faint);font-variant-numeric:tabular-nums;}

  #hint{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:14;font-size:11px;color:var(--ink-faint);
    letter-spacing:.03em;white-space:nowrap;transition:opacity .5s;pointer-events:none;}
  #hint.gone{opacity:0;}

  /* ── note panel ── */
  #panel{position:fixed;top:0;right:0;bottom:0;z-index:30;width:min(452px,93vw);background:var(--panel-solid);
    border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(103%);
    transition:transform .4s cubic-bezier(.19,.66,.28,1);overflow-y:auto;padding:32px 32px 60px;}
  #panel.open{transform:none;}
  #panel .close{position:absolute;top:22px;right:24px;width:32px;height:32px;display:grid;place-items:center;border-radius:9px;color:var(--ink-dim);border:1px solid transparent;}
  #panel .close:hover{color:var(--ink);border-color:var(--line);background:var(--card);}
  #panel .kicker{font-size:10px;letter-spacing:.24em;text-transform:uppercase;font-weight:600;}
  #panel h1{font-size:27px;line-height:1.12;margin:10px 0 15px;letter-spacing:-.02em;text-wrap:balance;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px;}
  .chip{font-size:11px;padding:4px 11px;border-radius:100px;border:1px solid var(--line);color:var(--ink-dim);background:var(--card);font-variant-numeric:tabular-nums;}
  .chip.type{color:#fff;font-weight:600;border:none;}
  .body{font-size:15px;line-height:1.72;color:var(--ink);}
  .body p{margin:0;max-width:60ch;}
  .wl{color:var(--accent-2);cursor:pointer;font-weight:550;border-bottom:1px solid color-mix(in srgb,var(--accent-2) 35%,transparent);transition:border-color .15s;}
  .wl:hover{border-bottom-color:var(--accent-2);}
  .wl.broken{color:var(--ink-faint);border-bottom-style:dashed;cursor:default;font-weight:400;}
  .meta{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);}
  .meta .t{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;}
  .backlink{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13.5px;color:var(--ink-dim);transition:background .12s,color .12s;}
  .backlink:hover{background:var(--card);color:var(--ink);}
  .backlink .d{width:8px;height:8px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor;}
  .backlink .u{margin-left:auto;font-size:9.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.12em;}

  #tip{position:fixed;z-index:25;pointer-events:none;display:none;padding:8px 12px;border-radius:11px;background:var(--panel-solid);border:1px solid var(--line);box-shadow:var(--shadow);white-space:nowrap;transform:translate(-50%,calc(-100% - 14px));}
  #tip .tt{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;}
  #tip .tt .d{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor;flex:none;}
  #tip .mt{font-size:11px;color:var(--ink-dim);margin-top:3px;}
  #tagfilter{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:18;display:none;align-items:center;gap:10px;padding:6px 7px 6px 14px;border-radius:100px;background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(14px);box-shadow:var(--shadow);font-size:12.5px;color:var(--ink-dim);cursor:pointer;}
  #tagfilter b{color:var(--accent-2);font-weight:600;}
  #tagfilter .x{width:19px;height:19px;display:grid;place-items:center;border-radius:50%;background:var(--card);color:var(--ink-dim);font-size:10px;}
  #tagfilter:hover .x{color:var(--ink);}
  .chip.tag:hover{border-color:var(--accent-2);color:var(--accent-2);}
  .tagcloud{display:flex;flex-wrap:wrap;gap:7px;}
  .tagpill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 11px;border-radius:100px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink-dim);cursor:pointer;transition:border-color .12s,color .12s;}
  .tagpill:hover{border-color:var(--accent-2);color:var(--ink);}
  .tagpill b{color:var(--ink-faint);font-weight:600;font-variant-numeric:tabular-nums;}
  .back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-dim);padding:5px 11px 5px 8px;border-radius:8px;border:1px solid var(--line);background:var(--card);margin-bottom:16px;cursor:pointer;}
  .back:hover{color:var(--ink);border-color:var(--line-2);}
  @media (max-width:680px){#bar{padding:15px 16px;gap:14px;}#legend{display:none;}#hint{display:none;}#tip{display:none!important;}.brand .eyebrow{display:none;}.stat{display:none;}.search{width:auto;flex:1;min-width:0;}#controls{bottom:20px;right:16px;}}
  @media (prefers-reduced-motion:reduce){#panel{transition:none;}#hint{transition:none;}}

/* cross-tool footer — this is one of tools-for-agents' six web views */
.xtk{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:11px;max-width:96vw;overflow-x:auto;padding:5px 14px;border:1px solid rgba(255,255,255,.1);border-bottom:none;border-radius:11px 11px 0 0;background:rgba(12,13,17,.82);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;line-height:1;white-space:nowrap;opacity:.5;transition:opacity .2s;scrollbar-width:none;}
.xtk::-webkit-scrollbar{display:none;}
.xtk:hover{opacity:1;}
.xtk .xtk-l{color:#8a8f9c;letter-spacing:.3px;}
.xtk a,.xtk .cur{color:var(--x);text-decoration:none;}
.xtk a{opacity:.62;transition:opacity .12s,text-shadow .12s;}
.xtk a:hover{opacity:1;text-shadow:0 0 10px var(--x);}
.xtk .cur{font-weight:700;}
:root[data-theme="light"] .xtk{background:rgba(244,247,254,.93);border-color:#dde4f1;}
:root[data-theme="light"] .xtk .xtk-l{color:#57617d;}
@media (prefers-color-scheme: light){:root:not([data-theme="dark"]) .xtk{background:rgba(244,247,254,.93);border-color:#dde4f1;}:root:not([data-theme="dark"]) .xtk .xtk-l{color:#57617d;}}
</style>

<canvas id="c"></canvas>

<header id="bar">
  <div class="brand">
    <span class="eyebrow mono">agent second brain</span>
    <span class="word">cor<b>tex</b><i>.</i></span>
  </div>
  <div class="stat mono"><b id="nc">0</b> notes <s>·</s> <b id="lc">0</b> links</div>
  <div class="search">
    <div class="ibox">
      <svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.2-4.2"/></svg>
      <input id="q" placeholder="search 36 notes…  ( / )" autocomplete="off" spellcheck="false" />
    </div>
    <div class="results" id="results"></div>
  </div>
</header>

<div id="controls">
  <button data-act="in" title="Zoom in" aria-label="Zoom in"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
  <button data-act="out" title="Zoom out" aria-label="Zoom out"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
  <div class="sep"></div>
  <button data-act="fit" title="Recenter (0)" aria-label="Recenter"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9V4h5M21 9V4h-5M3 15v5h5M21 15v5h-5"/></svg></button>
  <button data-act="theme" title="Toggle theme" aria-label="Toggle theme"><svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2M12 19.5v2M4.6 4.6l1.4 1.4M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4l1.4-1.4M18 6l1.4-1.4"/></svg></button>
  <div class="sep"></div>
  <button data-act="export" title="Download graph as PNG" aria-label="Download graph as PNG"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v11M8 11l4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg></button>
</div>

<div id="legend"></div>
<div id="hint" class="mono">hover to trace · click to read · drag to pin · scroll to zoom</div>
<div id="tagfilter"></div>
<div id="tip"></div>
<aside id="panel"><div class="close" id="px" role="button" aria-label="Close">×</div><div id="pb"></div></aside>

<script>
"use strict";
const TYPE={moc:{label:"map"},project:{label:"tool"},concept:{label:"concept"},source:{label:"source"},entity:{label:"entity"},note:{label:"note"},synthesis:{label:"synthesis"},person:{label:"person"},daily:{label:"daily"},area:{label:"area"}};
const TYPE_COLOR={project:"project",concept:"concept",source:"source",entity:"entity",moc:"moc",note:"concept",synthesis:"entity",person:"moc",daily:"concept",area:"source"};
// ── data: fetched live from the cortex server ────────────────────────────────
const slug=s=>String(s).toLowerCase().trim();
let nodes=[],edges=[],bySlug=new Map(),nbr=new Map(),resolver=new Map(),typeCounts={},tagCounts={},maxDeg=1,realCount=0,ghostCount=0;
function applyGraph(g,keep){
  const prev=bySlug,selId=selected?selected.id:null;
  nodes=(g.nodes||[]).map((n,i)=>{const p=keep&&prev.get(n.id),a=i*2.399963,r=8+Math.sqrt(i)*16;
    return {id:n.id,title:n.title||n.id,type:n.type||"note",tags:n.tags||[],deg:0,ghost:!!n.ghost||n.type==="ghost",
      pinned:p?!!p.pinned:false,x:p?p.x:Math.cos(a)*r,y:p?p.y:Math.sin(a)*r,vx:0,vy:0,hi:p?p.hi:1,sc:p?p.sc:1};});
  if(!keep){const pins=loadPins();for(const n of nodes)if(pins[n.id]){n.x=pins[n.id][0];n.y=pins[n.id][1];n.pinned=true;}}
  bySlug=new Map(nodes.map(n=>[n.id,n]));
  edges=(g.edges||[]).filter(e=>bySlug.has(e.source)&&bySlug.has(e.target)).map(e=>({s:bySlug.get(e.source),t:bySlug.get(e.target)}));
  nbr=new Map();nodes.forEach(n=>nbr.set(n.id,new Set()));
  edges.forEach(e=>{nbr.get(e.s.id).add(e.t.id);nbr.get(e.t.id).add(e.s.id);});
  nodes.forEach(n=>n.deg=nbr.get(n.id).size);
  realCount=nodes.filter(n=>!n.ghost).length;ghostCount=nodes.filter(n=>n.ghost).length;maxDeg=Math.max(1,...nodes.map(n=>n.deg));
  resolver=new Map();typeCounts={};tagCounts={};
  nodes.forEach(n=>{resolver.set(n.id,n.id);resolver.set(slug(n.title),n.id);if(!n.ghost){typeCounts[n.type]=(typeCounts[n.type]||0)+1;(n.tags||[]).forEach(t=>tagCounts[t]=(tagCounts[t]||0)+1);}n.d0=(1-n.deg/maxDeg)*0.4;});
  document.getElementById("nc").textContent=realCount;
  document.getElementById("lc").textContent=edges.length;
  document.getElementById("q").placeholder=`search ${realCount} notes…  ( / )`;
  buildLegend();hovered=null;
  selected=selId?(bySlug.get(selId)||null):null;if(selId&&!selected)closePanel();
}
async function loadGraph(){let g;try{g=await (await fetch("/api/graph")).json();}catch(e){g={nodes:[],edges:[]};}applyGraph(g,false);}
async function refreshGraph(){let g;try{g=await (await fetch("/api/graph")).json();}catch(e){return;}applyGraph(g,true);alpha=Math.max(alpha,0.6);}
// pinned layout: drag a node to pin it in place; positions persist across reloads
function savePins(){try{const p={};for(const n of nodes)if(n.pinned&&!n.ghost)p[n.id]=[Math.round(n.x),Math.round(n.y)];localStorage.setItem("cortex:pins",JSON.stringify(p));}catch(e){}}
function loadPins(){try{return JSON.parse(localStorage.getItem("cortex:pins")||"{}");}catch(e){return {};}}

// ── canvas + palette ─────────────────────────────────────────────────────────
const cv=document.getElementById("c"), ctx=cv.getContext("2d");
let W=0,H=0; const DPR=Math.min(devicePixelRatio||1,2);
const css=k=>getComputedStyle(document.documentElement).getPropertyValue(k).trim();
let PAL={}, isDark=true;
function readPalette(){const dt=document.documentElement.getAttribute("data-theme");
  isDark=dt?dt==="dark":matchMedia("(prefers-color-scheme: dark)").matches;
  PAL={project:css("--n-project"),concept:css("--n-concept"),source:css("--n-source"),entity:css("--n-entity"),moc:css("--n-moc"),
    ghost:css("--ink-faint"),ink:css("--ink"),dim:css("--ink-dim"),bg:css("--bg"),bg2:css("--bg-2"),glow:css("--glow"),nebula:css("--nebula"),line:css("--line")};}
const colorOf=n=>PAL[TYPE_COLOR[n.type]||"concept"]||PAL.concept;
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
function rgba(c,a){c=c.trim();if(c[0]==="#"){let h=c.slice(1);if(h.length===3)h=h.split("").map(x=>x+x).join("");const n=parseInt(h,16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}return c;}
function mixWhite(c,t){c=c.trim();let h=c.slice(1);if(h.length===3)h=h.split("").map(x=>x+x).join("");const n=parseInt(h,16);const r=(n>>16)&255,g=(n>>8)&255,b=n&255,f=v=>Math.round(v+(255-v)*t);return `rgb(${f(r)},${f(g)},${f(b)})`;}

// ── stars (subtle depth, world-space parallax) ───────────────────────────────

// ── interaction ──────────────────────────────────────────────────────────────

  if(e.touches.length===2){const d=touchDist(e);if(pinchD){const f=d/pinchD;const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2,w=toWorld(cx,cy);view.k=Math.max(0.35,Math.min(4.5,view.k*f));const p=S({x:w.x,y:w.y});view.x+=cx-p.x;view.y+=cy-p.y;}pinchD=d;return;}

cv.addEventListener("touchend",e=>{pinchD=0;if(miniDrag){miniDrag=false;return;}if(dragging){dragging.pinned=true;savePins();}else if(pendingDrag&&!pendingDrag.ghost)openNote(pendingDrag.id);pendingDrag=null;dragging=null;panning=false;},{passive:true});

// Only recenter when the clicked node would be hidden behind the panel or is near
// an edge — so clicking a comfortably-visible node leaves the graph perfectly still.
function centerOn(n){const pw=innerWidth>680?Math.min(452,innerWidth*0.93):0;const p=S(n);
  if(p.x>W-pw-56||p.x<56||p.y<96||p.y>H-56)panTo={x:-pw/2-n.x*view.k,y:-n.y*view.k};}

// ── controls ─────────────────────────────────────────────────────────────────
function zoomBy(f){markUsed();const w=toWorld(W/2,H/2);view.k=Math.max(0.35,Math.min(4.5,view.k*f));const p=S({x:w.x,y:w.y});view.x+=W/2-p.x;view.y+=H/2-p.y;}
document.getElementById("controls").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;const a=b.dataset.act;
  if(a==="in")zoomBy(1.3);else if(a==="out")zoomBy(1/1.3);
  else if(a==="export")exportPNG();
  else if(a==="fit"){userInteracted=false;closePanel();clearFilters();fit(null,true);}
  else if(a==="theme"){const cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",cur==="dark"?"light":"dark");}});
// export the current graph view as a high-res PNG (branded) — share your brain map
function exportPNG(){markUsed();hovered=null;
  hideMini=true;render();               // draw one clean frame so the minimap stays out of the shared image
  const off=document.createElement("canvas");off.width=cv.width;off.height=cv.height;
  const octx=off.getContext("2d");octx.drawImage(cv,0,0);hideMini=false;
  octx.setTransform(DPR,0,0,DPR,0,0);
  octx.font="600 13px ui-monospace,SFMono-Regular,Menlo,monospace";octx.textAlign="right";octx.textBaseline="bottom";
  octx.fillStyle=isDark?"rgba(230,237,251,.45)":"rgba(30,40,70,.45)";
  octx.fillText("cortex · agent second brain",W-20,H-16);
  off.toBlob(b=>{if(!b)return;const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="cortex-graph.png";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),2000);},"image/png");}

// ── note reader ───────────────────────────────────────────────────────────────
const esc=s=>s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function renderBody(t){t=t||"";return t.split(/\n{2,}/).map(p=>"<p>"+esc(p)
  .replace(/\[\[([^\]]+)\]\]/g,(m,inner)=>{const parts=inner.split("|"),id=resolver.get(slug(parts[0].trim())),label=(parts[1]||parts[0]).trim();return id?`<span class="wl" data-go="${id}">${esc(label)}</span>`:`<span class="wl broken">${esc(label)}</span>`;})
  .replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\n/g,"<br>")+"</p>").join("");}
const panel=document.getElementById("panel");
let navStack=[];
async function openNote(id,opts){const n=bySlug.get(id);if(!n||n.ghost)return;
  if(selected&&selected.id!==id&&!(opts&&opts.back))navStack.push(selected.id);
  selected=n;filterType=null;filterTag=null;syncLegend();syncTagFilter();markUsed();centerOn(n);tip.style.display="none";
  const back=edges.filter(e=>e.t===n).map(e=>e.s),fwd=edges.filter(e=>e.s===n).map(e=>e.t);
  const rows=arr=>arr.map(t=>`<div class="backlink" ${t.ghost?'style="cursor:default"':`data-go="${t.id}"`}><span class="d" style="color:${colorOf(t)};background:${colorOf(t)}"></span>${esc(t.title)}${t.ghost?'<span class="u">unwritten</span>':""}</div>`).join("");
  const prev=navStack.length?bySlug.get(navStack[navStack.length-1]):null;
  const backBtn=prev?`<div class="back" id="backBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>back to ${esc(prev.title)}</div>`:"";
  const label=(TYPE[n.type]||{label:n.type}).label;
  document.getElementById("pb").innerHTML=
    `${backBtn}<div class="kicker mono" style="color:${colorOf(n)}">${label}</div>
     <h1>${esc(n.title)}</h1>
     <div class="chips" id="chips"><span class="chip type" style="background:${colorOf(n)}">${label}</span><span class="chip">${back.length} backlinks</span><span class="chip">${fwd.length} links out</span></div>
     <div class="body" id="noteBody">…</div>
     ${fwd.length?`<div class="meta"><div class="t">Links to</div>${rows(fwd)}</div>`:""}
     ${back.length?`<div class="meta"><div class="t">Linked from</div>${rows(back)}</div>`:""}`;
  panel.classList.add("open");panel.scrollTop=0;
  const bb=document.getElementById("backBtn");if(bb)bb.addEventListener("click",goBack);
  wireRows();
  try{const note=await (await fetch("/api/note?slug="+encodeURIComponent(id))).json();
    if(selected!==n)return;
    const bodyEl=document.getElementById("noteBody");if(bodyEl){bodyEl.innerHTML=renderBody(note.body||"");bodyEl.querySelectorAll("[data-go]").forEach(a=>a.addEventListener("click",()=>openNote(a.dataset.go)));}
    const ch=document.getElementById("chips");if(ch&&note.tags&&note.tags.length)note.tags.forEach(t=>{const s=document.createElement("span");s.className="chip tag";s.textContent="#"+t;s.style.cursor="pointer";s.title="Filter the graph by #"+t;s.addEventListener("click",()=>setTagFilter(t));ch.appendChild(s);});
  }catch(e){const b=document.getElementById("noteBody");if(b)b.textContent="(could not load note)";}}   // click to navigate + hover a row to cross-highlight the node in the graph
function goBack(){const prev=navStack.pop();if(prev)openNote(prev,{back:true});}
function closePanel(){panel.classList.remove("open");selected=null;navStack=[];}
document.getElementById("px").addEventListener("click",closePanel);

// ── tag filter: highlight every note carrying a tag ───────────────────────────
function setTagFilter(t){filterTag=filterTag===t?null:t;filterType=null;markUsed();syncLegend();syncTagFilter();}
function clearFilters(){filterTag=null;filterType=null;syncLegend();syncTagFilter();}
function syncTagFilter(){const el=document.getElementById("tagfilter");if(!el)return;
  if(filterTag){el.innerHTML=`<span>filtering <b>#${esc(filterTag)}</b> · ${tagCounts[filterTag]||0} notes</span><span class="x">✕</span>`;el.style.display="flex";}
  else el.style.display="none";}
document.getElementById("tagfilter").addEventListener("click",()=>{filterTag=null;syncTagFilter();markUsed();});

// overview: click the header stat to see the graph at a glance
function wireRows(){panel.querySelectorAll("[data-go]").forEach(el=>{
  el.addEventListener("click",()=>openNote(el.dataset.go));
  el.addEventListener("mouseenter",()=>{const t=bySlug.get(el.dataset.go);if(t&&!t.ghost)hovered=t;});
  el.addEventListener("mouseleave",()=>{hovered=null;});});}
function showOverview(){selected=null;navStack=[];clearFilters();markUsed();tip.style.display="none";
  const hubs=nodes.filter(n=>!n.ghost).sort((a,b)=>b.deg-a.deg).slice(0,6);
  const types=Object.keys(typeCounts).map(t=>({t,c:typeCounts[t]})).sort((a,b)=>b.c-a.c);
  const topTags=Object.keys(tagCounts).map(t=>({t,c:tagCounts[t]})).sort((a,b)=>b.c-a.c).slice(0,10);
  const unwritten=nodes.filter(n=>n.ghost).length;
  document.getElementById("pb").innerHTML=
    `<div class="kicker mono" style="color:var(--accent)">overview</div>
     <h1>The graph at a glance</h1>
     <div class="chips"><span class="chip">${realCount} notes</span><span class="chip">${edges.length} links</span><span class="chip">${unwritten} unwritten</span></div>
     <div class="meta"><div class="t">Most connected</div>${hubs.map(h=>`<div class="backlink" data-go="${h.id}"><span class="d" style="color:${colorOf(h)};background:${colorOf(h)}"></span>${esc(h.title)}<span class="u">${h.deg} links</span></div>`).join("")}</div>
     <div class="meta"><div class="t">By type</div>${types.map(x=>{const c=css("--n-"+(TYPE_COLOR[x.t]||"concept"));return `<div class="backlink" style="cursor:default"><span class="d" style="color:${c};background:${c}"></span>${(TYPE[x.t]||{label:x.t}).label}<span class="u">${x.c}</span></div>`;}).join("")}</div>
     ${topTags.length?`<div class="meta"><div class="t">Top tags · click to filter</div><div class="tagcloud">${topTags.map(x=>`<span class="tagpill" data-tag="${esc(x.t)}">#${esc(x.t)}<b>${x.c}</b></span>`).join("")}</div></div>`:""}`;
  panel.classList.add("open");panel.scrollTop=0;wireRows();
  panel.querySelectorAll(".tagpill[data-tag]").forEach(el=>el.addEventListener("click",()=>setTagFilter(el.dataset.tag)));}
const statEl=document.querySelector(".stat");statEl.style.cursor="pointer";statEl.title="Graph overview";statEl.addEventListener("click",showOverview);

// ── search with dropdown ──────────────────────────────────────────────────────
const q=document.getElementById("q"),results=document.getElementById("results");
let matches=[],selIdx=-1,searchSeq=0;
async function runSearch(){const v=q.value.trim();
  if(!v){matches=[];results.classList.remove("on");hovered=null;return;}
  const seq=++searchSeq;let r;try{r=await (await fetch("/api/search?q="+encodeURIComponent(v)+"&k=8")).json();}catch(e){return;}
  if(seq!==searchSeq)return;
  matches=(r.results||[]).map(x=>({node:bySlug.get(x.slug),slug:x.slug,title:x.title,type:x.type,excerpt:(x.excerpt||"").replace(/\s+/g," ").trim()})).filter(x=>x.node);
  selIdx=matches.length?0:-1;drawResults(v);hovered=matches[0]?matches[0].node:null;}
function snippet(n,v){const b=n.body.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,(m,a,al)=>al||a);const i=b.toLowerCase().indexOf(v);if(i<0)return b.slice(0,60);return (i>14?"…":"")+b.slice(Math.max(0,i-12),i+48);}
function drawResults(v){if(!matches.length){results.innerHTML=`<div class="empty">no notes match “${esc(v)}”</div>`;results.classList.add("on");return;}
  results.innerHTML=matches.map((x,i)=>{const c=colorOf(x.node);return `<div class="r ${i===selIdx?"sel":""}" data-i="${i}"><span class="d" style="color:${c};background:${c}"></span><div class="tx"><div class="tt">${esc(x.title)}</div><div class="sn">${esc(x.excerpt)}</div></div><span class="ty">${(TYPE[x.type]||{label:x.type}).label}</span></div>`;}).join("");
  results.classList.add("on");
  results.querySelectorAll(".r").forEach(el=>{el.addEventListener("mouseenter",()=>{selIdx=+el.dataset.i;hovered=matches[selIdx].node;results.querySelectorAll(".r").forEach(x=>x.classList.toggle("sel",x===el));});
    el.addEventListener("click",()=>{openNote(matches[+el.dataset.i].slug);closeResults();});});}
function closeResults(){results.classList.remove("on");}
q.addEventListener("input",runSearch);
q.addEventListener("focus",()=>{if(q.value.trim())runSearch();});
q.addEventListener("keydown",e=>{if(!matches.length)return;
  if(e.key==="ArrowDown"){e.preventDefault();selIdx=(selIdx+1)%matches.length;hovered=matches[selIdx].node;drawResults(q.value.trim());}
  else if(e.key==="ArrowUp"){e.preventDefault();selIdx=(selIdx-1+matches.length)%matches.length;hovered=matches[selIdx].node;drawResults(q.value.trim());}
  else if(e.key==="Enter"&&selIdx>=0){openNote(matches[selIdx].slug);closeResults();q.blur();}});
document.addEventListener("click",e=>{if(!e.target.closest(".search"))closeResults();});
addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement!==q){e.preventDefault();q.focus();}
  else if(e.key==="Escape"){closeResults();closePanel();q.blur();hovered=null;clearFilters();}
  else if(e.key==="ArrowLeft"&&panel.classList.contains("open")&&navStack.length&&document.activeElement!==q){e.preventDefault();goBack();}
  else if((e.key==="+"||e.key==="=")&&document.activeElement!==q)zoomBy(1.3);
  else if(e.key==="-"&&document.activeElement!==q)zoomBy(1/1.3);
  else if(e.key==="0"&&document.activeElement!==q){userInteracted=false;fit(null,true);}});

// ── legend (click a type to isolate it) ───────────────────────────────────────
const legend=document.getElementById("legend");
function buildLegend(){const order=Object.keys(typeCounts).sort((a,b)=>typeCounts[b]-typeCounts[a]);
  legend.innerHTML=`<div class="t">node types · click to filter</div>`+order.map(t=>{const c=css("--n-"+(TYPE_COLOR[t]||"concept"));return `<div class="row" data-t="${t}"><span class="g" style="color:${c};background:${c}"></span>${(TYPE[t]?TYPE[t].label:t)}<span class="n">${typeCounts[t]||0}</span></div>`;}).join("")+(ghostCount?`<div class="row" data-t="ghost" style="cursor:default"><span class="g ghost"></span>unwritten<span class="n">${ghostCount}</span></div>`:"");
  legend.querySelectorAll(".row[data-t]").forEach(el=>{const t=el.dataset.t;if(t==="ghost")return;el.addEventListener("click",()=>{filterType=filterType===t?null:t;selected&&closePanel();markUsed();syncLegend();});});
  syncLegend();}
function syncLegend(){legend.querySelectorAll(".row[data-t]").forEach(el=>{const t=el.dataset.t;el.classList.toggle("solo",filterType===t);el.classList.toggle("off",filterType&&filterType!==t&&t!=="ghost");});}

// ── theme reactivity ──────────────────────────────────────────────────────────
function applyTheme(){readPalette();buildLegend();
  document.getElementById("themeIcon").innerHTML = isDark
    ? '<circle cx="12" cy="12" r="4.2"/><path d="M12 2.6v2.1M12 19.3v2.1M4.7 4.7l1.5 1.5M17.8 17.8l1.5 1.5M2.6 12h2.1M19.3 12h2.1M4.7 19.3l1.5-1.5M17.8 6.2l1.5-1.5"/>'
    : '<path d="M20.4 13A8 8 0 1 1 11 3.6 6.3 6.3 0 0 0 20.4 13z"/>';}
new MutationObserver(applyTheme).observe(document.documentElement,{attributes:true,attributeFilter:["data-theme"]});
matchMedia("(prefers-color-scheme: dark)").addEventListener("change",applyTheme);

// ── boot ──────────────────────────────────────────────────────────────────────
resize();applyTheme();
(async()=>{await loadGraph();alpha=1;for(let i=0;i<420;i++)step();alpha=0;fit();if(reduceMotion)intro=1;requestAnimationFrame(frame);openFromHash();})();
// deep-link: open a note by slug from the URL hash (e.g. "#recall"), so other tools can link straight to it
function openFromHash(){const s=decodeURIComponent(location.hash.slice(1));if(s&&bySlug.has(s)&&!bySlug.get(s).ghost)openNote(s);}
addEventListener("hashchange",openFromHash);
// live refresh: re-fetch the graph when the server signals a vault change (keeps positions, gently re-settles)
try{const es=new EventSource("/api/events");es.onmessage=()=>refreshGraph();}catch(e){}



</script>
